apiVersion: apps/v1
kind: Deployment
metadata:
  name: devshield-backend
  namespace: devshield
  labels:
    app: devshield-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devshield-backend
  template:
    metadata:
      labels:
        app: devshield-backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: devshield/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: devshield-config
            - secretRef:
                name: devshield-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1500m
              memory: 1.5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: devshield
spec:
  selector:
    app: devshield-backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devshield-backend-hpa
  namespace: devshield
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devshield-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
