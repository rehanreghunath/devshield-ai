apiVersion: apps/v1
kind: Deployment
metadata:
  name: devshield-frontend
  namespace: devshield
  labels:
    app: devshield-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devshield-frontend
  template:
    metadata:
      labels:
        app: devshield-frontend
    spec:
      containers:
        - name: frontend
          image: devshield/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://backend-service:8080"
            - name: INTERNAL_API_URL
              value: "http://backend-service:8080"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: devshield
spec:
  selector:
    app: devshield-frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
# Expose frontend externally via NodePort (swap to LoadBalancer or Ingress in production)
apiVersion: v1
kind: Service
metadata:
  name: frontend-external
  namespace: devshield
spec:
  selector:
    app: devshield-frontend
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30000
  type: NodePort
